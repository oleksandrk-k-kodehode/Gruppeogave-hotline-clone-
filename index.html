<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Figma Fury</title>

        <!------SCRIPTS---------->
        <script type="module" src="Main & Person/main.js" defer></script>
        <script type="module" src="Enemy/enemy.js" defer></script>

        <link rel="stylesheet" href="style.css" />
        <link
            rel="shortcut icon"
            href="./assets/scoreboard/skull-img.png"
            type="image/x-icon"
        />
    </head>
    <body>
        <section>
            <div id="map"></div>
            <!------------------SCOREBOARD-------------------->
            <div id="status">
                <div id="life">
                    <img
                        src="assets/scoreboard/hearts-img.png"
                        alt="life-image"
                    />
                </div>
                <div id="score">
                    <img
                        src="assets/scoreboard/skull-img.png"
                        alt="score-image"
                    />
                </div>
                <div id="cash">
                    <img src="assets/scoreboard/cash.png" alt="money-image" />
                </div>
                <div id="ammo">
                    <img
                        src="assets/scoreboard/ammo-count.png"
                        alt="ammo-image"
                    />
                    <span id="ammo-count">0</span>
                    <!-- Ammo count is updated by gameloop -->
                </div>
            </div>
        </section>
    </body>
</html>
